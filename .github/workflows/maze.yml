name: Generate QA release maze

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 1"

permissions:
  contents: write

concurrency:
  group: qa-release-maze
  cancel-in-progress: true

jobs:
  generate:
    name: Refresh maze artwork
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate this week's maze
        run: node scripts/generate-maze.mjs

      - name: Commit updated artwork
        shell: bash
        run: |
          if git diff --quiet -- assets/qa-release-maze.svg; then
            echo "Maze is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/qa-release-maze.svg
          git commit -m "chore: refresh QA release maze"
          git push
